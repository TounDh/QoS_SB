server.port=8088
server.servlet.context-path=/

spring.application.name=qosb-platform
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=NON_NULL

# CORS for Angular dev server
qosb.cors.allowed-origins=http://localhost:4200

# Future: FastAPI ML microservice (currently mocked)
qosb.ml-service.base-url=http://localhost:8000
qosb.ml-service.enabled=false

# Future: Groq LLM (currently mocked)
qosb.groq.api-key=
qosb.groq.model=llama-3.3-70b-versatile
qosb.groq.enabled=false

logging.level.com.qosb=INFO

# =====================================================
# Step 1: PostgreSQL connection
# =====================================================
# Override these via environment variables in production.
# In dev they default to a local PostgreSQL database named qosb_dev.
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:qosb_dev}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate settings.
# 'validate' = compare entity classes to the DB schema, fail fast if they drift.
# Schema itself is owned by Flyway, never by Hibernate.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.show-sql=false

# Flyway migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
